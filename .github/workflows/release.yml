name: build-and-release

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-linux-amd64:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            protobuf-compiler libprotobuf-dev \
            libncurses-dev libssl-dev zlib1g-dev libboost-all-dev

      - name: Build release tarball
        run: |
          scripts/package-release.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mosh-plus-linux-amd64
          path: build/release/artifacts/*.tar.gz

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: mosh-plus-linux-amd64-sha256
          path: build/release/artifacts/*.sha256

      - name: Attach artifacts to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            build/release/artifacts/*.tar.gz
            build/release/artifacts/*.sha256
